name: SEO 10-Day Cron

on:
  # Runs on the 1st, 11th, and 21st of each month at 10am UTC (~10 days apart)
  schedule:
    - cron: '0 10 1,11,21 * *'
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  seo-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        run: npm ci --workspace=apps/web --workspace=packages/shared

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install google-api-python-client google-auth

      - name: Run SEO cron
        env:
          GSC_KEY_JSON: ${{ secrets.GSC_KEY_JSON }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 2bb2365f7f5bbaa5919310174792aef9
        run: python3 scripts/seo-cron.py

      - name: Commit promoted cities
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/lib/service-centers.ts
          git diff --staged --quiet || git commit -m "SEO: promote next batch of cities [$(date +%Y-%m-%d)]"
          git push
        continue-on-error: true
