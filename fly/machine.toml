[build]
  image = "registry.fly.io/slotwatch:latest"

[env]
  DATA_DIR = "/data"
  PORT = "3001"
  NODE_ENV = "production"

[mounts]
  source = "slotwatch_data"
  destination = "/data"
  initial_size = "1gb"

[[services]]
  internal_port = 3001
  protocol = "tcp"
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]
    [services.ports.force_https]
      enabled = true
