<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13.5" stroke="#e8e8e8" stroke-width="1.75"/>

  <!-- Hour hand: 10:10 hour position -->
  <line x1="16" y1="16" x2="10.25" y2="12" stroke="#e8e8e8" stroke-width="2" stroke-linecap="round"/>

  <!-- Minute hand: 10 minutes -->
  <line x1="16" y1="16" x2="24.5" y2="11" stroke="#e8e8e8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.25" fill="#e8e8e8"/>

  <!-- Alert dot -->
  <circle cx="25.5" cy="7" r="4.5" fill="#080808"/>
  <circle cx="25.5" cy="7" r="3.5" fill="#e31937"/>
</svg>
