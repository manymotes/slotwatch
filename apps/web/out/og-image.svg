<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#080808"/>

  <!-- Red accent line at top -->
  <rect x="0" y="0" width="1200" height="4" fill="#e31937"/>

  <!-- Subtle grid lines for depth -->
  <line x1="0" y1="630" x2="1200" y2="630" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Left text block -->
  <!-- Product eyebrow -->
  <text
    x="80"
    y="238"
    font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
    font-size="16"
    font-weight="500"
    letter-spacing="0.18em"
    fill="#e31937"
    text-transform="uppercase"
  >TESLA SERVICE ALERTS</text>

  <!-- Main wordmark -->
  <text
    x="76"
    y="330"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="108"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-0.03em"
  >SlotWatch</text>

  <!-- Tagline -->
  <text
    x="80"
    y="392"
    font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
    font-size="26"
    font-weight="400"
    fill="#8a8a8a"
    letter-spacing="0.01em"
  >Skip the Tesla service wait.</text>

  <!-- Subtle divider below tagline -->
  <line x1="80" y1="430" x2="300" y2="430" stroke="#e31937" stroke-width="1.5" opacity="0.6"/>

  <!-- Feature chips row -->
  <rect x="80" y="456" width="140" height="32" rx="16" fill="#1a1a1a" stroke="#2e2e2e" stroke-width="1"/>
  <text x="150" y="476" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#aaaaaa" text-anchor="middle" letter-spacing="0.04em">Instant Alerts</text>

  <rect x="234" y="456" width="130" height="32" rx="16" fill="#1a1a1a" stroke="#2e2e2e" stroke-width="1"/>
  <text x="299" y="476" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#aaaaaa" text-anchor="middle" letter-spacing="0.04em">All Locations</text>

  <rect x="378" y="456" width="150" height="32" rx="16" fill="#1a1a1a" stroke="#2e2e2e" stroke-width="1"/>
  <text x="453" y="476" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#aaaaaa" text-anchor="middle" letter-spacing="0.04em">Free to Use</text>

  <!-- Right side: large clock mark -->
  <!-- Clock outer ring - large, centered on right half -->
  <circle cx="920" cy="315" r="215" stroke="#222222" stroke-width="1"/>
  <circle cx="920" cy="315" r="200" stroke="#e8e8e8" stroke-width="8"/>

  <!-- Inner bezel ring -->
  <circle cx="920" cy="315" r="178" stroke="#2a2a2a" stroke-width="2" opacity="0.8"/>

  <!-- Tick marks at 12, 3, 6, 9 -->
  <line x1="920" y1="118" x2="920" y2="138" stroke="#e8e8e8" stroke-width="7" stroke-linecap="round"/>
  <line x1="1118" y1="315" x2="1098" y2="315" stroke="#e8e8e8" stroke-width="7" stroke-linecap="round"/>
  <line x1="920" y1="512" x2="920" y2="492" stroke="#e8e8e8" stroke-width="7" stroke-linecap="round"/>
  <line x1="722" y1="315" x2="742" y2="315" stroke="#e8e8e8" stroke-width="7" stroke-linecap="round"/>

  <!-- Minor tick marks -->
  <line x1="1019.6" y1="146.8" x2="1011.8" y2="161.3" stroke="#444444" stroke-width="3" stroke-linecap="round"/>
  <line x1="1085.2" y1="215.4" x2="1070.7" y2="223.2" stroke="#444444" stroke-width="3" stroke-linecap="round"/>
  <line x1="1085.2" y1="414.6" x2="1070.7" y2="406.8" stroke="#444444" stroke-width="3" stroke-linecap="round"/>
  <line x1="1019.6" y1="483.2" x2="1011.8" y2="468.7" stroke="#444444" stroke-width="3" stroke-linecap="round"/>
  <line x1="820.4" y1="146.8" x2="828.2" y2="161.3" stroke="#444444" stroke-width="3" stroke-linecap="round"/>
  <line x1="754.8" y1="215.4" x2="769.3" y2="223.2" stroke="#444444" stroke-width="3" stroke-linecap="round"/>
  <line x1="754.8" y1="414.6" x2="769.3" y2="406.8" stroke="#444444" stroke-width="3" stroke-linecap="round"/>
  <line x1="820.4" y1="483.2" x2="828.2" y2="468.7" stroke="#444444" stroke-width="3" stroke-linecap="round"/>

  <!-- Hour hand at 10:10 position -->
  <!-- 10:10 -> hour hand at 305 deg from 12, math angle = 305-90 = 215 deg -->
  <!-- cx=920, cy=315, len=110 -->
  <!-- x = 920 + 110*cos(215*pi/180) = 920 + 110*(-0.8192) = 920 - 90.1 = 829.9 -->
  <!-- y = 315 + 110*sin(215*pi/180) = 315 + 110*(-0.5736) = 315 - 63.1 = 251.9 -->
  <line x1="920" y1="315" x2="830" y2="252" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>

  <!-- Minute hand at 10 min = 60 deg from 12, math angle = 60-90 = -30 deg -->
  <!-- len=155 -->
  <!-- x = 920 + 155*cos(-30*pi/180) = 920 + 155*0.8660 = 920 + 134.2 = 1054.2 -->
  <!-- y = 315 + 155*sin(-30*pi/180) = 315 + 155*(-0.5) = 315 - 77.5 = 237.5 -->
  <line x1="920" y1="315" x2="1054" y2="238" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>

  <!-- Center pivot -->
  <circle cx="920" cy="315" r="10" fill="#e8e8e8"/>
  <circle cx="920" cy="315" r="5" fill="#080808"/>

  <!-- Alert notification dot -->
  <!-- Positioned at ~1 o'clock, partially outside the ring -->
  <!-- 1 o'clock on rim: angle=30deg from top = -60deg math -->
  <!-- x = 920 + 200*cos(-60*pi/180) = 920 + 200*0.5 = 920+100=1020 -->
  <!-- y = 315 + 200*sin(-60*pi/180) = 315 + 200*(-0.866) = 315-173=142 -->
  <!-- Push out to 215 radius for badge-outside-ring look -->
  <!-- x = 920 + 215*cos(-60deg) = 920 + 107.5 = 1027.5 -->
  <!-- y = 315 + 215*sin(-60deg) = 315 - 186.2 = 128.8 -->
  <circle cx="1028" cy="129" r="38" fill="#080808"/>
  <circle cx="1028" cy="129" r="30" fill="#e31937"/>
  <!-- Exclamation mark inside dot -->
  <rect x="1025" y="114" width="6" height="18" rx="3" fill="#ffffff"/>
  <rect x="1025" y="137" width="6" height="6" rx="3" fill="#ffffff"/>

  <!-- Subtle bottom gradient vignette -->
  <defs>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.7" stop-color="#080808" stop-opacity="0"/>
      <stop offset="1" stop-color="#080808" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- URL / domain hint -->
  <text
    x="80"
    y="590"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="15"
    fill="#3d3d3d"
    letter-spacing="0.06em"
  >slotwatch.app</text>
</svg>
